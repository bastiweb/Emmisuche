<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ app_name if app_name else "Recipe Search" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}" />
  </head>
  <body>
    {% set current_path = request.url.path if request is defined else "/" %}
    <header class="site-header">
      <div class="container">
        <a href="/" class="brand">Emmi kocht einfach Suche</a>
        <nav class="top-nav">
          <a href="/" class="{% if current_path == '/' %}is-active{% endif %}">Suche</a>
          <a href="/favorites" class="{% if current_path.startswith('/favorites') %}is-active{% endif %}">Favoriten</a>
          <a href="/admin" class="{% if current_path.startswith('/admin') %}is-active{% endif %}">Index-Status</a>
        </nav>
      </div>
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
