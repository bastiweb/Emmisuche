server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    # Redirect public traffic to HTTPS after TLS is configured.
    # return 301 https://$host$request_uri;

    access_log /var/log/nginx/emmisuche.access.log;
    error_log /var/log/nginx/emmisuche.error.log;

    client_max_body_size 1m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https: data:; style-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    # Enable after HTTPS is active for this hostname:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8910;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8910;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}
